<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sekra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <div class="noise"></div>
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  <div class="glow-orb orb-3"></div>

  <div class="app">

    <header class="header">
      <div class="logo">
        <div class="logo-mark">
          <span></span><span></span><span></span>
        </div>
        <span class="logo-text">Reverie</span>
      </div>
      <p class="tagline">music that understands you</p>
    </header>

    <main class="main">

      <!-- Input section -->
      <section class="input-section">
        <label class="input-label">how are you feeling right now?</label>
        <div class="textarea-wrap">
          <textarea id="userInput" placeholder="I've been feeling restless lately, like something's about to change..." rows="3"></textarea>
          <div class="textarea-border"></div>
        </div>
        <button id="submitBtn" class="btn-primary">
          <span class="btn-text">generate playlist</span>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </section>

      <!-- Loader -->
      <div id="loader" class="loader hidden">
        <div class="loader-bars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p class="loader-text">reading your emotion...</p>
      </div>

      <!-- Emotion chip -->
      <div id="emotionInfo" class="emotion-chip hidden">
        <span class="emotion-label">detected</span>
        <span id="emotionPrimary" class="emotion-primary"></span>
        <span id="emotionSecondary" class="emotion-secondary"></span>
      </div>

      <!-- Song results -->
      <section id="results" class="results hidden">
        <div class="results-header">
          <h2 class="results-title">your tracks</h2>
          <span id="trackCount" class="track-count"></span>
        </div>
        <ul id="songList" class="song-list"></ul>
      </section>

      <!-- Create playlist button -->
      <button id="createPlaylistBtn" class="btn-spotify hidden">
        <svg viewBox="0 0 24 24" fill="currentColor" class="spotify-icon">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <span>save to spotify</span>
      </button>

      <!-- Playlist success -->
      <div id="playlistLink" class="playlist-success hidden">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="success-content">
          <p class="success-title">playlist created</p>
          <a id="spotifyLink" target="_blank" class="success-link">open in spotify →</a>
        </div>
      </div>

    </main>

    <footer class="footer">
      <span>emotion-driven recommendations · reverie</span>
    </footer>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
